<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editar Curso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Frameworks UAZ</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'lista_miembros' %}">Miembros</a>
                <a class="nav-link" href="{% url 'lista_cursos' %}">Cursos</a>
                <a class="nav-link" href="/admin/">Admin</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Editar Curso: {{ curso.nombre }}</h1>
        <hr>

        <div class="card">
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">Actualizar</button>
                    <a href="{% url 'lista_cursos' %}" class="btn btn-secondary">Volver</a>
                </form>
            </div>
        </div>
    </div>

</body>

</html>
