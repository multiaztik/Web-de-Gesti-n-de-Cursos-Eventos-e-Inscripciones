{% extends 'core/base.html' %}

{% block content %}

<h2>Crear miembro</h2>

{% if form.non_field_errors %}
<div>
    {{ form.non_field_errors }}
</div>
{% endif %}

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Guardar</button>
</form>

<p>
    <a href="{% url 'lista_miembros' %}">Volver a la lista</a>
</p>

{% endblock %}
