{% extends 'base.html' %}
{% block titulo %}Registro{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card">
            <div class="card-header fw-bold"><i class="bi bi-person-plus"></i> Crear cuenta</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small mt-1">{% for e in field.errors %}{{ e }}{% endfor %}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-person-check"></i> Registrarse
                    </button>
                </form>
                <hr>
                <p class="text-center mb-0">¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
